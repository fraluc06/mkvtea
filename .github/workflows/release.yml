name: Release

on:
  workflow_dispatch:
    inputs:
      version_number:
        description: 'Version number (e.g. 1.1.1)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version_number }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format. Use semantic versioning: x.y.z"
            exit 1
          fi

      - name: Verify version matches source
        run: |
          SOURCE_VERSION=$(grep -oP 'var Version = "\K[^"]+' internal/config/config.go)
          if [ "$SOURCE_VERSION" != "${{ inputs.version_number }}" ]; then
            echo "Version mismatch: source=$SOURCE_VERSION, input=${{ inputs.version_number }}"
            echo "Update internal/config/config.go first and push to main."
            exit 1
          fi
          echo "Version $SOURCE_VERSION verified"

      - name: Check tag does not exist
        run: |
          if git rev-parse "v${{ inputs.version_number }}" >/dev/null 2>&1; then
            echo "Tag v${{ inputs.version_number }} already exists"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0

      - name: Run tests
        run: go test -race ./...

      - name: Build for all platforms
        run: |
          VERSION="${{ inputs.version_number }}"
          mkdir -p dist

          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w -X mkvtea/internal/config.Version=$VERSION" -o dist/mkvtea-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w -X mkvtea/internal/config.Version=$VERSION" -o dist/mkvtea-linux-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w -X mkvtea/internal/config.Version=$VERSION" -o dist/mkvtea-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w -X mkvtea/internal/config.Version=$VERSION" -o dist/mkvtea-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X mkvtea/internal/config.Version=$VERSION" -o dist/mkvtea-windows-amd64.exe .

      - name: Smoke test
        run: |
          chmod +x dist/mkvtea-linux-amd64
          OUTPUT=$(./dist/mkvtea-linux-amd64 --version 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "${{ inputs.version_number }}" || {
            echo "Smoke test failed: version not found in output"
            exit 1
          }

      - name: Create checksums
        run: cd dist && sha256sum * > checksums.txt

      - name: Create tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "v${{ inputs.version_number }}" -m "Release v${{ inputs.version_number }}"
          git push origin "v${{ inputs.version_number }}"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "v${{ inputs.version_number }}^" 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "Initial release" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            {
              echo "changelog<<EOF"
              echo "**Changes since $PREV_TAG:**"
              echo ""
              git log --oneline --no-merges "$PREV_TAG..HEAD"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version_number }}
          name: MKVTea v${{ inputs.version_number }}
          body: |
            ${{ steps.changelog.outputs.changelog }}

            ### Installation

            #### Linux (amd64)
            ```
            wget https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version_number }}/mkvtea-linux-amd64
            chmod +x mkvtea-linux-amd64 && sudo mv mkvtea-linux-amd64 /usr/local/bin/mkvtea
            ```

            #### Linux (arm64)
            ```
            wget https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version_number }}/mkvtea-linux-arm64
            chmod +x mkvtea-linux-arm64 && sudo mv mkvtea-linux-arm64 /usr/local/bin/mkvtea
            ```

            #### macOS (Apple Silicon)
            ```
            curl -L https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version_number }}/mkvtea-darwin-arm64 -o mkvtea
            chmod +x mkvtea && sudo mv mkvtea /usr/local/bin/
            ```

            #### macOS (Intel)
            ```
            curl -L https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version_number }}/mkvtea-darwin-amd64 -o mkvtea
            chmod +x mkvtea && sudo mv mkvtea /usr/local/bin/
            ```

            #### Windows
            ```powershell
            Invoke-WebRequest -Uri "https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version_number }}/mkvtea-windows-amd64.exe" -OutFile "mkvtea.exe"
            ```

            #### Verify checksums
            ```
            sha256sum -c checksums.txt
            ```
          files: |
            dist/mkvtea-linux-amd64
            dist/mkvtea-linux-arm64
            dist/mkvtea-darwin-amd64
            dist/mkvtea-darwin-arm64
            dist/mkvtea-windows-amd64.exe
            dist/checksums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "## v${{ inputs.version_number }} released" >> $GITHUB_STEP_SUMMARY
          echo "[View release](https://github.com/${{ github.repository }}/releases/tag/v${{ inputs.version_number }})" >> $GITHUB_STEP_SUMMARY
